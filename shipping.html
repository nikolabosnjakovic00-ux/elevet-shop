<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVET | Shipping Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { background-color: #FDFBF7; color: #1C1917; }</style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Simple Elegant Header -->
    <nav class="bg-white border-b border-stone-100 h-20 flex justify-between items-center px-6 sticky top-0 z-40 shadow-sm">
        <a href="index.html" class="text-2xl font-light tracking-[0.3em] uppercase">ELE<span class="font-medium">VET</span></a>
        <a href="cart.html" class="text-xs uppercase tracking-widest text-stone-500 hover:text-stone-900 transition">
            <i class="fa-solid fa-arrow-left mr-1.5"></i> Back to Bag
        </a>
    </nav>

    <!-- Main Address Entry Form -->
    <main class="flex-grow max-w-xl w-full mx-auto px-6 py-12">
        <div class="mb-8">
            <span class="text-[9px] font-mono uppercase tracking-widest text-stone-400">Checkout // Step 01 of 02</span>
            <h1 class="text-2xl font-light uppercase tracking-wide text-stone-900 mt-1">Delivery Address</h1>
            <p class="text-xs text-stone-400 mt-1">Please insert your precise geographical location coordinates below.</p>
        </div>

        <!-- HTML Form capturing data -->
        <form onsubmit="saveAddressAndProceed(event)" class="space-y-5 text-xs">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-stone-500 mb-1.5 uppercase font-medium tracking-wider">First Name</label>
                    <input type="text" required id="f-name" class="w-full p-3.5 border border-stone-200 bg-white rounded-xl outline-none focus:ring-1 focus:ring-stone-900 font-medium">
                </div>
                <div>
                    <label class="block text-stone-500 mb-1.5 uppercase font-medium tracking-wider">Last Name</label>
                    <input type="text" required id="l-name" class="w-full p-3.5 border border-stone-200 bg-white rounded-xl outline-none focus:ring-1 focus:ring-stone-900 font-medium">
                </div>
            </div>
            
            <div>
                <label class="block text-stone-500 mb-1.5 uppercase font-medium tracking-wider">Street Address & Apartment</label>
                <input type="text" required id="address" placeholder="e.g., Keizersgracht 421, Apt 4" class="w-full p-3.5 border border-stone-200 bg-white rounded-xl outline-none focus:ring-1 focus:ring-stone-900 font-medium">
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="col-span-2">
                    <label class="block text-stone-500 mb-1.5 uppercase font-medium tracking-wider">City</label>
                    <input type="text" required id="city" class="w-full p-3.5 border border-stone-200 bg-white rounded-xl outline-none focus:ring-1 focus:ring-stone-900 font-medium">
                </div>
                <div>
                    <label class="block text-stone-500 mb-1.5 uppercase font-medium tracking-wider">Postal Code</label>
                    <input type="text" required id="zip" class="w-full p-3.5 border border-stone-200 bg-white rounded-xl outline-none focus:ring-1 focus:ring-stone-900 font-medium text-center font-mono">
                </div>
            </div>

            <div>
                <label class="block text-stone-500 mb-1.5 uppercase font-medium tracking-wider">Contact Phone Number</label>
                <input type="tel" required id="phone" placeholder="+31 00 000 0000" class="w-full p-3.5 border border-stone-200 bg-white rounded-xl outline-none focus:ring-1 focus:ring-stone-900 font-medium">
            </div>

            <!-- Action button that packages address metadata into browser LocalStorage memory -->
            <button type="submit" class="w-full bg-stone-900 text-white uppercase tracking-widest font-bold py-4 rounded-xl shadow-md hover:bg-stone-800 transition transform active:scale-[0.99] mt-6">
                Proceed to Payment Terminal <i class="fa-solid fa-arrow-right ml-1.5"></i>
            </button>
        </form>
    </main>

    <script>
        function saveAddressAndProceed(e) {
            e.preventDefault(); // Stop page from standard reloading loops
            
            // Package form parameters up neatly
            const informationPayload = {
                name: `${document.getElementById('f-name').value} ${document.getElementById('l-name').value}`,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                zip: document.getElementById('zip').value,
                phone: document.getElementById('phone').value
            };
            
            // Store it down into LocalStorage so checkout.html can read it automatically
            localStorage.setItem('elevet_shipping', JSON.stringify(informationPayload));
            
            // Advance screen smoothly to payment terminal page
            window.location.href = "checkout.html";
        }
    </script>
</body>
</html>
