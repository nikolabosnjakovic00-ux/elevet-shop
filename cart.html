<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVET | Your Bag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { background-color: #FDFBF7; color: #1C1917; }</style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Premium Navigation -->
    <nav class="bg-white border-b border-stone-100 h-20 flex justify-between items-center px-6 sticky top-0 z-40">
        <a href="index.html" class="text-2xl font-light tracking-[0.3em] uppercase">ELE<span class="font-medium">VET</span></a>
        <a href="index.html" class="text-xs uppercase tracking-widest text-stone-500 hover:text-stone-900 transition">
            <i class="fa-solid fa-arrow-left mr-1.5"></i> Continue Shopping
        </a>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        <h1 class="text-xl font-light tracking-wide uppercase mb-8">Your Selected Manifest</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Dynamic Item Manifest List -->
            <div id="cart-items-container" class="lg:col-span-2 space-y-4">
                <!-- JavaScript populates items seamlessly here -->
            </div>

            <!-- Receipt Breakdown Summary Card Panel -->
            <div class="bg-white border border-stone-200/60 rounded-2xl p-6 h-fit sticky top-28 shadow-sm">
                <h3 class="text-xs uppercase tracking-widest font-bold text-stone-800 mb-4">Summary</h3>
                
                <div class="space-y-3 text-xs border-b border-stone-100 pb-4 mb-4">
                    <div class="flex justify-between text-stone-500">
                        <span>Items Subtotal</span>
                        <span id="summary-subtotal" class="font-mono">€0.00</span>
                    </div>
                    <div class="flex justify-between text-stone-500">
                        <span>Eco-Priority Logistics</span>
                        <span class="text-emerald-600 font-medium tracking-wider uppercase text-[10px]">Complimentary</span>
                    </div>
                </div>

                <div class="flex justify-between text-sm font-bold mb-6">
                    <span>Total Gross</span>
                    <span id="summary-total" class="font-mono text-base">€0.00</span>
                </div>

                <a href="shipping.html" id="checkout-btn" class="block w-full bg-stone-900 text-white text-center text-xs uppercase tracking-widest font-bold py-4 rounded-xl hover:bg-stone-800 transition shadow-md">
                    Proceed to Shipping
                </a>
            </div>
        </div>
    </main>

    <!-- Global Layout Core Logic Engine -->
    <script>
        function renderCart() {
            // Pull the persistent matrix storage directly from the browser cache
            const items = JSON.parse(localStorage.getItem('elevet_cart')) || [];
            const container = document.getElementById('cart-items-container');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            // Safety fallback route for empty sessions
            if(items.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white border border-dashed rounded-2xl border-stone-200 text-stone-400 text-xs uppercase tracking-widest">
                        <i class="fa-solid fa-box-open text-2xl mb-3 block text-stone-300"></i>
                        Your luxury bag is currently empty
                    </div>`;
                checkoutBtn.style.pointerEvents = 'none';
                checkoutBtn.classList.add('opacity-40');
                document.getElementById('summary-subtotal').innerText = "€0.00";
                document.getElementById('summary-total').innerText = "€0.00";
                return;
            }

            // Revive checkout button accessibility 
            checkoutBtn.style.pointerEvents = 'auto';
            checkoutBtn.classList.remove('opacity-40');

            let subtotal = 0;
            
            // Map over items rendering the designated custom color and structural dimensions
            container.innerHTML = items.map((item, idx) => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                
                return `
                    <div class="flex items-center justify-between bg-white border border-stone-100 rounded-2xl p-5 shadow-sm transition hover:shadow-md">
                        <div class="flex items-center space-x-5">
                            <div class="w-16 h-20 rounded-xl overflow-hidden bg-stone-50 border flex-shrink-0">
                                <img src="${item.img}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h3 class="text-xs font-bold uppercase tracking-wide text-stone-900">${item.name}</h3>
                                
                                <!-- Core Dimension Matrix Outputs -->
                                <div class="flex flex-wrap gap-2 mt-2">
                                    <span class="bg-stone-50 border text-stone-600 text-[9px] font-mono px-2 py-0.5 rounded-md uppercase tracking-wider">
                                        Palette: <strong>${item.color || 'Standard'}</strong>
                                    </span>
                                    <span class="bg-stone-50 border text-stone-600 text-[9px] font-mono px-2 py-0.5 rounded-md uppercase tracking-wider">
                                        Outline: <strong>Size ${item.size || 'M'}</strong>
                                    </span>
                                </div>

                                <p class="text-xs font-bold text-stone-900 font-mono mt-3">€${item.price.toFixed(2)}</p>
                            </div>
                        </div>

                        <div class="flex items-center space-x-6">
                            <!-- Multi-unit Volume Counter -->
                            <div class="text-xs text-stone-400 font-mono">
                                Vol: <span class="text-stone-900 font-bold bg-stone-100 px-2 py-1 rounded-md ml-1">${item.qty}</span>
                            </div>
                            
                            <!-- Document Deletion Trigger Handle -->
                            <button onclick="removeItem(${idx})" class="w-8 h-8 rounded-full hover:bg-rose-50 text-stone-300 hover:text-rose-600 border border-transparent hover:border-rose-100 flex items-center justify-center transition">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Apply calculated monetary metrics to the totals box
            document.getElementById('summary-subtotal').innerText = `€${subtotal.toFixed(2)}`;
            document.getElementById('summary-total').innerText = `€${subtotal.toFixed(2)}`;
        }

        function removeItem(idx) {
            let cart = JSON.parse(localStorage.getItem('elevet_cart')) || [];
            cart.splice(idx, 1); // Slice specific index profile node out of our storage map
            localStorage.setItem('elevet_cart', JSON.stringify(cart));
            renderCart(); // Live loop component redraw
        }

        // Initialize display configuration on Document Object Model readiness window
        document.addEventListener("DOMContentLoaded", renderCart);
    </script>
</body>
</html>
