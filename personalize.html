<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVET | Custom Studio Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; color: #1C1917; }</style>
</head>
<body>
    <nav class="bg-white border-b border-stone-100 h-20 flex justify-between items-center px-6">
        <a href="index.html" class="text-2xl font-light tracking-[0.3em] uppercase">ELE<span class="font-medium">VET</span></a>
        <div class="space-x-8 text-xs uppercase tracking-widest">
            <a href="collections.html" class="text-stone-500">Collections</a>
            <a href="personalize.html" class="font-bold border-b border-stone-900">Personalize</a>
            <a href="about.html" class="text-stone-500">About</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-2 gap-12">
        <!-- Dynamic T-Shirt Mockup -->
        <div class="bg-stone-100 rounded-3xl p-12 flex flex-col items-center justify-center relative">
            <div class="w-64 h-80 bg-white shadow-sm rounded-xl relative flex items-center justify-center border">
                <!-- Shirt Body Simulation -->
                <span class="absolute top-4 text-xs font-mono text-stone-300">PREVIEW MODALITY</span>
                <div id="canvas-text" class="text-xl font-bold tracking-[0.4em] uppercase text-stone-800">YOUR LOGO</div>
            </div>
        </div>

        <!-- Custom Studio Form Controls -->
        <div class="flex flex-col justify-center">
            <h1 class="text-2xl font-light tracking-wide mb-2">Personalized Studio Engine</h1>
            <p class="text-xs text-stone-400 mb-6">Type custom messaging or submit a pre-built vector blueprint.</p>

            <form onsubmit="handleFormSubmission(event)" class="space-y-6">
                <div>
                    <label class="block text-xs uppercase font-bold tracking-wider text-stone-600 mb-2">1. On-Screen Mockup Text</label>
                    <input type="text" id="studio-input" oninput="document.getElementById('canvas-text').innerText = this.value.toUpperCase() || 'YOUR LOGO'" maxlength="15" placeholder="ELEVET TYPE" class="w-full p-4 border bg-white rounded-xl uppercase tracking-widest outline-none focus:ring-1 focus:ring-black">
                </div>

                <div>
                    <label class="block text-xs uppercase font-bold tracking-wider text-stone-600 mb-2">2. Upload Vector Vector File Blueprint (PDF)</label>
                    <div class="border-2 border-dashed border-stone-300 rounded-2xl p-6 text-center bg-white cursor-pointer hover:bg-stone-50 transition relative">
                        <input type="file" id="pdf-file" accept=".pdf" required class="absolute inset-0 opacity-0 cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up text-stone-400 text-2xl mb-2"></i>
                        <p class="text-xs font-semibold text-stone-700">Drop your custom PDF pattern layout here</p>
                        <p class="text-[10px] text-stone-400 mt-1">File automatically routes directly to production@elevet.com on checkout clearing.</p>
                    </div>
                </div>

                <button type="submit" class="w-full bg-stone-900 text-white text-xs uppercase tracking-widest font-bold py-4 rounded-xl shadow-md hover:bg-stone-800 transition">Lock Design & Add to Bag</button>
            </form>
        </div>
    </main>

    <script>
        function handleFormSubmission(e) {
            e.preventDefault();
            const fileInput = document.getElementById('pdf-file');
            if (fileInput.files.length === 0) {
                alert("Please attach your layout blueprint PDF first.");
                return;
            }
            alert(`Design locked! The custom configuration text and the attached PDF file ("${fileInput.files[0].name}") will automatically bundle into your checkout sheet data packet.`);
            window.location.href = "cart.html";
        }
    </script>
</body>
</html>
