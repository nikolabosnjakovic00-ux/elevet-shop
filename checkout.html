<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVET | Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; color: #1C1917; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="checkout-window" class="w-full max-w-md bg-white border rounded-3xl p-8 shadow-xl">
        <h2 class="text-center text-sm uppercase font-bold tracking-widest mb-6">Payment Authorization</h2>
        <div class="bg-stone-50 p-4 rounded-xl mb-6 flex justify-between text-xs items-center">
            <span>Total Outstanding Amount:</span>
            <span id="payment-amount" class="font-bold text-sm">€0.00</span>
        </div>

        <form onsubmit="executePayment(event)" class="space-y-4 text-xs">
            <input type="text" placeholder="Card Number (4242 •••• •••• 4242)" required class="w-full p-3.5 border bg-white rounded-xl outline-none text-center">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="MM / YY" required class="w-full p-3.5 border bg-white rounded-xl text-center">
                <input type="text" placeholder="CVC" required class="w-full p-3.5 border bg-white rounded-xl text-center">
            </div>
            <button type="submit" class="w-full bg-stone-900 text-white uppercase tracking-widest font-bold py-4 rounded-xl mt-4">Pay Invoice Balance</button>
        </form>
    </div>

    <div id="receipt-window" class="w-full max-w-lg bg-white border rounded-3xl p-8 shadow-2xl hidden">
        <div class="text-center border-b pb-4 mb-4">
            <h2 class="text-xl font-light uppercase tracking-widest text-emerald-600">Order Dispatched</h2>
            <p class="text-xs text-stone-400 mt-1">Receipt reference packet #ELVT-2026</p>
        </div>
        <div class="text-xs space-y-4">
            <div class="flex justify-between"><span>Delivery Route Window:</span><span class="font-bold text-emerald-700">3 - 5 Business Days</span></div>
            <div class="border-t pt-4">
                <h4 class="font-bold uppercase text-stone-400 mb-1">Consignee Routing Details</h4>
                <p id="receipt-name" class="font-bold"></p>
                <p id="receipt-address" class="text-stone-500 font-light"></p>
            </div>
            <div class="border-t pt-4 flex justify-between text-sm font-bold">
                <span>Total Settled</span>
                <span id="receipt-total">€0.00</span>
            </div>
        </div>
        <a href="index.html" onclick="localStorage.clear();" class="block w-full bg-stone-100 text-stone-800 text-center text-xs uppercase tracking-widest font-bold py-3 rounded-xl mt-6">Finish & Clear Session</a>
    </div>

    <script>
        const cartItems = JSON.parse(localStorage.getItem('elevet_cart')) || [];
        const shippingInfo = JSON.parse(localStorage.getItem('elevet_shipping')) || {};
        const totalAmount = cartItems.reduce((sum, item) => sum + (item.price * item.qty), 0);

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('payment-amount').innerText = `€${totalAmount.toFixed(2)}`;
        });

        function executePayment(e) {
            e.preventDefault();
            document.getElementById('checkout-window').style.display = 'none';
            document.getElementById('receipt-window').classList.remove('hidden');

            document.getElementById('receipt-total').innerText = `€${totalAmount.toFixed(2)}`;
            document.getElementById('receipt-name').innerText = shippingInfo.name || "Customer Account";
            document.getElementById('receipt-address').innerHTML = `${shippingInfo.address || 'N/A'}, ${shippingInfo.zip || ''} ${shippingInfo.city || ''}`;
        }
    </script>
</body>
</html>
