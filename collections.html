<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVET | Collections Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; color: #1C1917; }</style>
</head>
<body>
    <script>
        const ELEVET_CART = {
            get() { return JSON.parse(localStorage.getItem('elevet_cart')) || []; },
            save(cart) { localStorage.setItem('elevet_cart', JSON.stringify(cart)); this.updateBadge(); },
            add(id, name, price, img, color = "Standard") {
                let cart = this.get();
                let existing = cart.find(item => item.id === id && item.color === color);
                if (existing) { existing.qty += 1; } else { cart.push({ id, name, price, img, color, qty: 1 }); }
                this.save(cart); alert(`${name} added.`);
            },
            updateBadge() {
                const b = document.getElementById('cart-count');
                if(b) { b.innerText = this.get().reduce((s,i)=>s+i.qty,0); b.style.display = b.innerText > 0 ? 'inline-block':'none'; }
            }
        };
    </script>

    <nav class="bg-white border-b border-stone-100 h-20 flex justify-between items-center px-6">
        <a href="index.html" class="text-2xl font-light tracking-[0.3em] uppercase">ELE<span class="font-medium">VET</span></a>
        <div class="space-x-8 text-xs uppercase tracking-widest">
            <a href="collections.html" class="font-bold border-b border-stone-900">Collections</a>
            <a href="cart.html">Bag (<span id="cart-count">0</span>)</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex space-x-4 mb-12 border-b pb-4 overflow-x-auto text-xs uppercase font-bold tracking-widest text-stone-400">
            <button onclick="switchCollection('mens')" class="text-stone-900 mr-4">🧔 Mens Core</button>
            <button onclick="switchCollection('womens')" class="hover:text-stone-900 mr-4">👩 Womens Core</button>
            <button onclick="switchCollection('kids')" class="hover:text-stone-900 mr-4">👶 Kids Premium</button>
            <button onclick="switchCollection('espresso')" class="hover:text-stone-900 mr-4">☕ Espresso Club</button>
        </div>

        <div id="collection-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script src="products.js"></script>
    <script>
        function switchCollection(slug) {
            const matches = ELEVET_PRODUCTS.filter(p => p.collection === slug).slice(0, 10);
            document.getElementById("collection-grid").innerHTML = matches.map(p => `
                <div class="bg-white border border-stone-100 rounded-2xl p-4 shadow-sm flex flex-col justify-between">
                    <img src="${p.images[p.colors[0]]}" class="w-full aspect-[3/4] object-cover rounded-xl mb-3">
                    <h3 class="text-xs font-bold uppercase truncate">${p.name}</h3>
                    <div class="mt-4 pt-2 border-t flex justify-between items-center text-xs">
                        <span class="font-bold">€${p.price.toFixed(2)}</span>
                        <button onclick="ELEVET_CART.add('${p.id}', \`${p.name}\`, ${p.price}, '${p.images[p.colors[0]]}')" class="bg-stone-900 text-white px-2 py-1 rounded text-[10px] uppercase">Buy</button>
                    </div>
                </div>
            `).join('');
        }
        document.addEventListener("DOMContentLoaded", () => { ELEVET_CART.updateBadge(); switchCollection('mens'); });
    </script>
</body>
</html>
